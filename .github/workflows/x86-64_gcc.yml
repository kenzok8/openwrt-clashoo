name: Build luci-app-clashoo

on:
  workflow_dispatch:
  push:
    branches:
      - test
    tags:
      - 'v*'

jobs:
  build:
    name: build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - 24.10.4
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a9_neon
          - i386_pentium4
          - mips_24kc
          - mipsel_24kc
          - x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RETAIN_DAYS: "10"
          KEEP_MINIMUM_RUNS: "8"
        run: |
          set -euo pipefail
          cutoff=$(date -u -d "${RETAIN_DAYS} days ago" +%s)
          mapfile -t runs < <(gh run list --repo "$REPO" --workflow "$WORKFLOW_NAME" --limit 200 --json databaseId,createdAt --jq '.[] | [.databaseId, .createdAt] | @tsv')
          total=${#runs[@]}
          if [ "$total" -le "$KEEP_MINIMUM_RUNS" ]; then
            echo "No workflow runs to delete ($total <= $KEEP_MINIMUM_RUNS)"
            exit 0
          fi
          index=0
          for run in "${runs[@]}"; do
            index=$((index + 1))
            [ "$index" -le "$KEEP_MINIMUM_RUNS" ] && continue
            run_id=${run%%$'\t'*}
            created_at=${run#*$'\t'}
            created_epoch=$(date -u -d "$created_at" +%s)
            [ "$created_epoch" -gt "$cutoff" ] && continue
            echo "Deleting workflow run $run_id ($created_at)"
            gh api --method DELETE "repos/$REPO/actions/runs/$run_id" || true
          done

      - name: Remove old releases
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP: "20"
        run: |
          set -euo pipefail
          mapfile -t tags < <(gh release list --repo "$REPO" --limit 200 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          total=${#tags[@]}
          if [ "$total" -le "$KEEP" ]; then
            echo "No old releases to delete ($total <= $KEEP)"
            exit 0
          fi
          for tag in "${tags[@]:$KEEP}"; do
            echo "Deleting $tag"
            gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag || true
          done

      - name: Build
        uses: kenzok8/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-clashoo
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: true

      - name: Store packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: bin/packages/${{ matrix.arch }}/packages_ci/*.ipk

      - name: Zip packages
        run: |
          zip -j ${{ matrix.arch }}-${{ matrix.sdk }}.zip \
            bin/packages/${{ matrix.arch }}/packages_ci/*.ipk
          echo -e "**luci-app-clashoo** 编译包 🎈\n" >> release.txt
          echo -e "架构: \`${{ matrix.arch }}\`，SDK: ${{ matrix.sdk }}\n" >> release.txt
          echo -e "安装方法：将 ipk 文件上传到设备 \`/tmp\` 目录，执行 \`opkg install *.ipk\`\n" >> release.txt

      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          artifacts: "${{ matrix.arch }}-${{ matrix.sdk }}.zip,bin/packages/${{ matrix.arch }}/packages_ci/*.ipk"
          allowUpdates: true
          replacesArtifacts: true
          bodyFile: "release.txt"
          tag: ${{ github.run_number }}-${{ matrix.arch }}

