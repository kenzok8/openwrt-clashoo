name: Auto Bump Mihomo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: '18 2 * * *'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check latest Mihomo tag
        id: check
        shell: bash
        run: |
          set -euo pipefail
          latest="$(gh api repos/MetaCubeX/mihomo/releases/latest --jq '.tag_name')"
          current="$(tr -d '\r\n' < .github/mihomo_tag.txt)"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ "$latest" = "$current" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update tag file and push
        if: steps.check.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          latest="${{ steps.check.outputs.latest }}"
          echo "$latest" > .github/mihomo_tag.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/mihomo_tag.txt
          git commit -m "chore: bump mihomo to ${latest}" || exit 0
          git push origin HEAD:main

          rel_tag="v1.9.0-auto-$(date +%Y%m%d)-${latest#v}"
          git tag -a "$rel_tag" -m "auto: mihomo ${latest}"
          git push origin "$rel_tag"
