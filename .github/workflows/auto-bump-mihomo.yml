name: Auto Bump Mihomo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: '18 2 * * *'

permissions:
  contents: write

jobs:
  get_current_info:
    runs-on: ubuntu-latest
    outputs:
      pkg_source_version: ${{ steps.info.outputs.pkg_source_version }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: info
        id: info
        run: |
          echo "pkg_source_version=$(grep 'PKG_SOURCE_VERSION:=' clashoo/Makefile | cut -d '=' -f 2)" >> $GITHUB_OUTPUT

  get_latest_info:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.info.outputs.commit_sha }}
      commit_date: ${{ steps.info.outputs.commit_date }}
      short_sha: ${{ steps.info.outputs.short_sha }}
      checksum: ${{ steps.info.outputs.checksum }}
    steps:
      - name: checkout mihomo
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: Alpha
          path: mihomo

      - name: info
        id: info
        run: |
          echo "commit_sha=$(git -C mihomo rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "commit_date=$(git -C mihomo log -1 --format=%cs)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git -C mihomo rev-parse --short HEAD)" >> $GITHUB_OUTPUT

          COMMIT_SHA="$(git -C mihomo rev-parse HEAD)"
          SHORT_SHA="$(git -C mihomo rev-parse --short HEAD)"
          SUBDIR="clashoo-alpha-${SHORT_SHA}"
          SOURCE="${SUBDIR}.tar.zst"
          TAR_TIMESTAMP="$(git -C mihomo log -1 --format='@%ct')"

          WORKDIR="$(mktemp -d)"
          trap 'rm -rf "${WORKDIR}"' EXIT

          # 生成与 OpenWrt 下载流程一致的源码归档（含子模块内容）
          cp -a mihomo "${WORKDIR}/src"
          git -C "${WORKDIR}/src" checkout "${COMMIT_SHA}"
          git -C "${WORKDIR}/src" submodule update --init --recursive --
          git -C "${WORKDIR}/src" config core.abbrev 8
          git -C "${WORKDIR}/src" archive --format=tar HEAD --output="${WORKDIR}/src.tar.git"
          tar --numeric-owner --owner=0 --group=0 --ignore-failed-read -C "${WORKDIR}/src" -f "${WORKDIR}/src.tar.git" -r .git .gitmodules 2>/dev/null || true

          rm -rf "${WORKDIR}/src"
          mkdir -p "${WORKDIR}/${SUBDIR}"
          tar -C "${WORKDIR}/${SUBDIR}" -xf "${WORKDIR}/src.tar.git"
          (cd "${WORKDIR}/${SUBDIR}" && git submodule update --init --recursive -- && rm -rf .git .gitmodules)

          tar --numeric-owner --owner=0 --group=0 --mode=a-s --sort=name --mtime="${TAR_TIMESTAMP}" -C "${WORKDIR}" -c "${SUBDIR}" | zstd -T0 --ultra -20 -c > "${WORKDIR}/${SOURCE}"

          echo "checksum=$(sha256sum "${WORKDIR}/${SOURCE}" | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT

  update:
    needs:
      - get_current_info
      - get_latest_info
    if: needs.get_current_info.outputs.pkg_source_version != needs.get_latest_info.outputs.commit_sha
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Makefile
        run: |
          sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=alpha-${{ needs.get_latest_info.outputs.short_sha }}/" clashoo/Makefile
          sed -i "s/PKG_SOURCE_DATE:=.*/PKG_SOURCE_DATE:=${{ needs.get_latest_info.outputs.commit_date }}/" clashoo/Makefile
          sed -i "s/PKG_SOURCE_VERSION:=.*/PKG_SOURCE_VERSION:=${{ needs.get_latest_info.outputs.commit_sha }}/" clashoo/Makefile
          sed -i "s/PKG_MIRROR_HASH:=.*/PKG_MIRROR_HASH:=${{ needs.get_latest_info.outputs.checksum }}/" clashoo/Makefile
          sed -i "s/PKG_BUILD_VERSION:=.*/PKG_BUILD_VERSION:=alpha-${{ needs.get_latest_info.outputs.short_sha }}/" clashoo/Makefile

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clashoo/Makefile
          git diff --cached --quiet && { echo "No changes"; exit 0; }
          git commit -m "chore: bump mihomo to alpha-${{ needs.get_latest_info.outputs.short_sha }}"
          git push origin HEAD:main

          rel_tag="alpha-${{ needs.get_latest_info.outputs.short_sha }}-$(date +%Y%m%d)"
          git tag -a "$rel_tag" -m "auto: mihomo alpha-${{ needs.get_latest_info.outputs.short_sha }}"
          git push origin "$rel_tag"
