name: Build Clashoo Packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
  B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
  B2_BUCKET: ${{ secrets.B2_BUCKET }}

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    name: ${{ matrix.arch }}-${{ matrix.branch }} release
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a9_neon
          - i386_pentium4
          - mips_24kc
          - mipsel_24kc
          - x86_64
        branch:
          - openwrt-24.10

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-clashoo
          INDEX: 1
          NO_REFRESH_CHECK: true

      - name: compress
        run: |
          mkdir -p public/${{ matrix.branch }}/${{ matrix.arch }}
          cp -r bin/packages/${{ matrix.arch }}/packages_ci/* public/${{ matrix.branch }}/${{ matrix.arch }}/
          tar -c -z -f clashoo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz public/${{ matrix.branch }}/${{ matrix.arch }}

      - if: github.event_name == 'push' && startsWith(github.ref_name, 'v')
        name: release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clashoo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz

      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: clashoo_${{ matrix.arch }}-${{ matrix.branch }}
          path: clashoo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz

  feed:
    needs: release
    name: feed
    runs-on: ubuntu-latest

    steps:
      - name: download
        uses: actions/download-artifact@v8
        with:
          pattern: clashoo_*
          merge-multiple: true

      - name: uncompress
        run: |
          ls -la
          for file in clashoo_*.tar.gz; do [ -f "$file" ] && tar -x -z -f "$file"; done

      - name: Upload packages to Backblaze B2
        run: |
          set -euo pipefail
          [ -n "$B2_KEY_ID" ] || { echo "Missing B2_KEY_ID"; exit 1; }
          [ -n "$B2_APPLICATION_KEY" ] || { echo "Missing B2_APPLICATION_KEY"; exit 1; }
          [ -n "$B2_BUCKET" ] || { echo "Missing B2_BUCKET"; exit 1; }

          curl -fsSL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [b2]
          type = b2
          account = $B2_KEY_ID
          key = $B2_APPLICATION_KEY
          hard_delete = true
          EOF

          rclone sync public/clashoo/ "b2:$B2_BUCKET/clashoo/" \
            --checksum \
            --fast-list \
            --transfers 8 \
            --checkers 16
