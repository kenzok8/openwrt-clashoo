name: Build Clashoo Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: ["24.10.4"]
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a9_neon
          - i386_pentium4
          - mips_24kc
          - mipsel_24kc
          - riscv64
          - x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Prepare mihomo core binary
        shell: bash
        run: |
          set -euo pipefail
          tag="v1.19.22"
          arch="${{ matrix.arch }}"
          case "$arch" in
            x86_64) core_arch="linux-amd64" ;;
            aarch64_generic|aarch64_cortex-a53|aarch64_cortex-a72) core_arch="linux-arm64" ;;
            arm_cortex-a7_neon-vfpv4|arm_cortex-a9_neon) core_arch="linux-armv7" ;;
            i386_pentium4) core_arch="linux-386" ;;
            mips_24kc) core_arch="linux-mips-softfloat" ;;
            mipsel_24kc) core_arch="linux-mipsle-softfloat" ;;
            riscv64) core_arch="linux-riscv64" ;;
            *) echo "Unsupported arch: $arch"; exit 1 ;;
          esac

          mkdir -p "core/mihomo/${arch}"
          url="https://gh-proxy.com/https://github.com/MetaCubeX/mihomo/releases/download/${tag}/mihomo-${core_arch}-${tag}.gz"
          curl -fL --connect-timeout 20 --max-time 300 "$url" -o "core/mihomo/${arch}/mihomo.gz"
          gunzip -f "core/mihomo/${arch}/mihomo.gz"
          chmod 0755 "core/mihomo/${arch}/mihomo"

      - name: Build packages
        uses: kenzok8/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-clashoo
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: bin/packages/${{ matrix.arch }}/packages_ci/*.ipk

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          artifacts: bin/packages/${{ matrix.arch }}/packages_ci/*.ipk
          allowUpdates: true
          replacesArtifacts: true
          tag: ${{ github.ref_name }}
          body: |
            Auto-built packages for `${{ matrix.arch }}` on SDK `${{ matrix.sdk }}`.
