name: Build Clashoo Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: ["24.10.4"]
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a9_neon
          - i386_pentium4
          - mips_24kc
          - mipsel_24kc
          - x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Prepare mihomo core binary
        shell: bash
        run: |
          set -euo pipefail
          tag="v1.19.22"
          arch="${{ matrix.arch }}"
          case "$arch" in
            x86_64) core_arch="linux-amd64" ;;
            aarch64_generic|aarch64_cortex-a53|aarch64_cortex-a72) core_arch="linux-arm64" ;;
            arm_cortex-a7_neon-vfpv4|arm_cortex-a9_neon) core_arch="linux-armv7" ;;
            i386_pentium4) core_arch="linux-386" ;;
            mips_24kc) core_arch="linux-mips-softfloat" ;;
            mipsel_24kc) core_arch="linux-mipsle-softfloat" ;;
            riscv64) core_arch="linux-riscv64" ;;
            *) echo "Unsupported arch: $arch"; exit 1 ;;
          esac

          mkdir -p "core/mihomo/${arch}"
          urls=(
            "https://gh-proxy.com/https://github.com/MetaCubeX/mihomo/releases/download/${tag}/mihomo-${core_arch}-${tag}.gz"
            "https://github.com/MetaCubeX/mihomo/releases/download/${tag}/mihomo-${core_arch}-${tag}.gz"
          )
          ok=0
          for url in "${urls[@]}"; do
            if curl -fL --connect-timeout 20 --max-time 300 "$url" -o "core/mihomo/${arch}/mihomo.gz"; then
              ok=1
              break
            fi
          done
          [ "$ok" -eq 1 ] || { echo "Failed to download core for ${arch}"; exit 1; }
          gunzip -f "core/mihomo/${arch}/mihomo.gz"
          chmod 0755 "core/mihomo/${arch}/mihomo"

      - name: Build packages in SDK container
        shell: bash
        run: |
          set -euo pipefail
          arch="${{ matrix.arch }}"
          sdk="${{ matrix.sdk }}"
          image="ghcr.io/openwrt/sdk:${sdk}-${arch}"

          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            "$image" /bin/bash -lc '
              set -e
              cd /builder
              mkdir -p /tmp/myfeed
              ln -sf /workspace /tmp/myfeed/luci-app-clashoo
              { echo "src-link packages_ci /tmp/myfeed"; cat feeds.conf.default; } > feeds.conf
              ./scripts/feeds update -a
              ./scripts/feeds install -a
              make defconfig
              make package/luci-app-clashoo/compile -j$(nproc) V=s
              mkdir -p /workspace/artifacts/'"${arch}"'
              find bin/packages/'"${arch}"'/packages_ci -maxdepth 1 -type f -name "*.ipk" -exec cp {} /workspace/artifacts/'"${arch}"'/ \;
            '

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: artifacts/${{ matrix.arch }}/*.ipk

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          artifacts: artifacts/${{ matrix.arch }}/*.ipk
          allowUpdates: true
          replacesArtifacts: true
          tag: ${{ github.ref_name }}
          body: |
            Auto-built packages for `${{ matrix.arch }}` on SDK `${{ matrix.sdk }}`.
