name: release-packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
  B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
  B2_BUCKET: ${{ secrets.B2_BUCKET }}

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'alpha-*'

jobs:
  release:
    name: ${{ matrix.arch }}-${{ matrix.branch }} release
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a9_neon
          - i386_pentium4
          - mips_24kc
          - mipsel_24kc
          - x86_64
        branch:
          - openwrt-24.10
          - openwrt-25.12

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          FEEDNAME: clashoo
          PACKAGES: clashoo luci-app-clashoo
          INDEX: 1
          NO_REFRESH_CHECK: true

      - name: compress
        run: |
          mkdir -p dist
          cp -av bin/packages/${{ matrix.arch }}/clashoo/*.ipk dist/ 2>/dev/null || true
          cp -av bin/packages/${{ matrix.arch }}/clashoo/*.apk dist/ 2>/dev/null || true
          tar -c -z -f clashoo_${{ matrix.arch }}.${{ matrix.branch }}.tar.gz -C bin/packages/${{ matrix.arch }}/clashoo .
          mkdir -p public/${{ matrix.branch }}/${{ matrix.arch }}
          mv bin/packages/${{ matrix.arch }}/clashoo public/${{ matrix.branch }}/${{ matrix.arch }}
          tar -c -z -f feed_clashoo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz public/${{ matrix.branch }}/${{ matrix.arch }}

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            dist/*.ipk
            dist/*.apk
            clashoo_${{ matrix.arch }}.${{ matrix.branch }}.tar.gz

      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: feed_clashoo_${{ matrix.arch }}-${{ matrix.branch }}
          path: feed_clashoo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz

  feed:
    needs: release
    name: feed
    runs-on: ubuntu-latest

    steps:
      - name: download
        uses: actions/download-artifact@v8
        with:
          pattern: feed_clashoo_*
          merge-multiple: true

      - name: uncompress
        run: |
          for file in feed_clashoo_*.tar.gz; do [ -f "$file" ] && tar -x -z -f "$file"; done

      - name: Upload packages to Backblaze B2
        run: |
          set -euo pipefail
          [ -n "$B2_KEY_ID" ] || { echo "Missing B2_KEY_ID"; exit 1; }
          [ -n "$B2_APPLICATION_KEY" ] || { echo "Missing B2_APPLICATION_KEY"; exit 1; }
          [ -n "$B2_BUCKET" ] || { echo "Missing B2_BUCKET"; exit 1; }

          curl -fsSL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [b2]
          type = b2
          account = $B2_KEY_ID
          key = $B2_APPLICATION_KEY
          hard_delete = true
          EOF

          rclone sync public/ "b2:$B2_BUCKET/clashoo/" \
            --checksum \
            --fast-list \
            --transfers 8 \
            --checkers 16
