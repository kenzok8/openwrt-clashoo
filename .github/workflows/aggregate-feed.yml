name: Aggregate Unified Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '37 4 * * *'

concurrency:
  group: aggregate-unified-feed
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aggregate:
    name: Merge and sign feed
    runs-on: ubuntu-latest

    steps:
      - name: Prepare rclone
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          [ -z "$R2_ACCESS_KEY_ID" ] && { echo "No R2 credentials"; exit 1; }
          curl -fsSL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = ${R2_ENDPOINT}
          acl = private
          no_check_bucket = true
          EOF

      - name: Download project feeds
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          [ -z "$R2_BUCKET" ] && { echo "No R2 bucket"; exit 1; }
          mkdir -p aggregate/clashoo aggregate/daed aggregate/jell merged
          rclone copy "r2:${R2_BUCKET}/openwrt-feed/clashoo/" aggregate/clashoo/ --fast-list || true
          rclone copy "r2:${R2_BUCKET}/openwrt-feed/daed/" aggregate/daed/ --fast-list || true
          rclone copy "r2:${R2_BUCKET}/openwrt-feed/jell/" aggregate/jell/ --fast-list || true

          for project in clashoo daed jell; do
            [ -d "aggregate/${project}" ] || continue
            find "aggregate/${project}" -mindepth 2 -maxdepth 2 -type d | while read -r dir; do
              sdk=$(basename "$(dirname "$dir")")
              arch=$(basename "$dir")
              target="merged/${sdk}/${arch}"
              mkdir -p "$target"
              find "$dir" -maxdepth 1 -type f \( -name '*.apk' -o -name '*.ipk' \) -exec cp -v {} "$target/" \;
            done
          done

          find merged -type f | sort
          find merged -type f | grep -q . || { echo "No packages to aggregate"; exit 1; }

      - name: Generate signed indexes
        env:
          KEY_BUILD: ${{ secrets.OPKG_KEY_BUILD }}
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
        run: |
          [ -z "$KEY_BUILD" ] && { echo "No OPKG signing key"; exit 1; }
          [ -z "$PRIVATE_KEY" ] && { echo "No APK signing key"; exit 1; }
          printf '%s\n' "$KEY_BUILD" > key-build
          printf '%s\n' "$PRIVATE_KEY" > private-key.pem
          chmod -R a+w merged/

          git clone --depth 1 https://github.com/openwrt/gh-action-sdk.git sdk-action
          docker build -t sdk-tools --build-arg ARCH=x86_64-openwrt-25.12 sdk-action
          docker run --rm --user root --entrypoint bash \
            -v "$PWD/merged":/work \
            -v "$PWD/key-build":/keys/key-build:ro \
            -v "$PWD/private-key.pem":/keys/private-key.pem:ro \
            sdk-tools -c '
              set -eu
              mkdir -p /artifacts && chmod 777 /artifacts
              bash setup.sh
              export PATH="$PWD/staging_dir/host/bin:$PATH"
              if [ ! -x "$PWD/staging_dir/host/bin/sha256" ]; then
                printf "#!/bin/sh\nexec mkhash sha256 \"\$@\"\n" > "$PWD/staging_dir/host/bin/sha256"
                chmod +x "$PWD/staging_dir/host/bin/sha256"
              fi
              SDK_DIR="$PWD"
              for dir in /work/[0-9]*/*; do
                [ -d "$dir" ] || continue
                cd "$dir"
                apk_count=$(ls ./*.apk 2>/dev/null | wc -l)
                ipk_count=$(ls ./*.ipk 2>/dev/null | wc -l)
                echo "==> $dir  APK=$apk_count IPK=$ipk_count"
                if [ "$apk_count" -gt 0 ]; then
                  rm -f packages.adb packages.adb.* APKINDEX*
                  "$SDK_DIR/staging_dir/host/bin/apk" mkndx --allow-untrusted --sign-key /keys/private-key.pem --output packages.adb ./*.apk
                  echo "  APK: packages.adb $(wc -c < packages.adb) bytes"
                fi
                if [ "$ipk_count" -gt 0 ]; then
                  rm -f Packages Packages.gz Packages.sig
                  "$SDK_DIR/scripts/ipkg-make-index.sh" . > Packages
                  gzip -9nc Packages > Packages.gz
                  "$SDK_DIR/staging_dir/host/bin/usign" -S -m Packages -s /keys/key-build
                  echo "  IPK: Packages.gz $(wc -c < Packages.gz) bytes, signed"
                fi
              done
            '

      - name: Prepare keys and upload
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          OPKG_PUB_KEY: ${{ secrets.OPKG_PUB_KEY }}
          APK_PUB_KEY: ${{ secrets.APK_PUB_KEY }}
        run: |
          set -euo pipefail
          echo "=== Index files generated ==="
          find merged \( -name "packages.adb" -o -name "Packages.gz" -o -name "Packages.sig" \) | sort
          mkdir -p merged/keys
          printf '%s\n' "$OPKG_PUB_KEY" > merged/keys/dllkids-feed.pub
          printf '%s\n' "$APK_PUB_KEY" > merged/keys/dllkids-feed.pub.pem

          rclone copy merged/keys/ "r2:${R2_BUCKET}/openwrt-feed/keys/" --checksum --fast-list

          dirs=()
          while IFS= read -r d; do dirs+=("$d"); done < <(find merged -mindepth 2 -maxdepth 2 -type d)
          for dir in "${dirs[@]}"; do
            sdk=$(basename "$(dirname "$dir")")
            arch=$(basename "$dir")
            [ "$sdk" = "keys" ] && continue
            echo "Uploading ${sdk}/${arch} ..."
            rclone sync "$dir/" "r2:${R2_BUCKET}/openwrt-feed/${sdk}/${arch}/" --checksum --fast-list --transfers 8 --checkers 16
            echo "  -> done"
          done

      - name: Verify R2 upload
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          echo "Checking keys ..."
          rclone lsf "r2:${R2_BUCKET}/openwrt-feed/keys/" --files-only > /dev/null || { echo "FAIL: no keys"; exit 1; }
          echo "  -> OK"

          fail=0
          for dir in merged/*/*; do
            [ -d "$dir" ] || continue
            sdk=$(basename "$(dirname "$dir")")
            arch=$(basename "$dir")
            [ "$sdk" = "keys" ] && continue

            echo "Checking ${sdk}/${arch} ..."
            if rclone lsf "r2:${R2_BUCKET}/openwrt-feed/${sdk}/${arch}/" --files-only > /dev/null 2>&1; then
              echo "  -> OK"
            else
              echo "  -> FAIL"
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            echo "Verification FAILED"
            exit 1
          fi
          echo "All R2 paths verified OK"
