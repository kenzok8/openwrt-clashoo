name: Aggregate Unified Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '37 4 * * *'

concurrency:
  group: aggregate-unified-feed
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aggregate:
    name: Merge and sign feed
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          # usign: OpenWrt signing tool
          sudo apt-get update -qq && sudo apt-get install -y -qq cmake libssl-dev
          git clone --depth 1 https://github.com/openwrt/usign.git
          cd usign && cmake . && make -j$(nproc) && sudo cp usign /usr/local/bin/

          # apk.static: use Alpine container to fetch the static package
          docker run --rm alpine:latest sh -c 'apk update >/dev/null && apk fetch --stdout apk-tools-static 2>/dev/null' > /tmp/apk-static.apk
          [ -s /tmp/apk-static.apk ] || { echo "Failed to download apk-tools-static"; exit 1; }
          tar xzf /tmp/apk-static.apk -C /tmp sbin/apk.static
          sudo cp /tmp/sbin/apk.static /usr/local/bin/apk.static
          sudo chmod +x /usr/local/bin/apk.static

          # ipkg-make-index.sh
          curl -fsSL -o ipkg-make-index.sh \
            "https://raw.githubusercontent.com/openwrt/openwrt/main/scripts/ipkg-make-index.sh"
          chmod +x ipkg-make-index.sh && sudo mv ipkg-make-index.sh /usr/local/bin/

          # verify
          command -v usign && command -v apk.static && command -v ipkg-make-index.sh && command -v openssl

      - name: Prepare rclone
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        run: |
          [ -z "$B2_KEY_ID" ] && { echo "No B2 credentials"; exit 1; }
          curl -fsSL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [b2]
          type = b2
          account = ${B2_KEY_ID}
          key = ${B2_APPLICATION_KEY}
          hard_delete = true
          EOF

      - name: Merge project feeds
        env:
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
        run: |
          [ -z "$B2_BUCKET" ] && { echo "No B2 bucket"; exit 1; }
          mkdir -p aggregate/clashoo aggregate/daed aggregate/jell merged keys
          rclone copy "b2:${B2_BUCKET}/openwrt-feed/clashoo/" aggregate/clashoo/ --fast-list || true
          rclone copy "b2:${B2_BUCKET}/openwrt-feed/daed/" aggregate/daed/ --fast-list || true
          rclone copy "b2:${B2_BUCKET}/openwrt-feed/jell/" aggregate/jell/ --fast-list || true

          for project in clashoo daed jell; do
            [ -d "aggregate/${project}" ] || continue
            find "aggregate/${project}" -mindepth 2 -maxdepth 2 -type d | while IFS= read -r dir; do
              sdk=$(basename "$(dirname "$dir")")
              arch=$(basename "$dir")
              target="merged/${sdk}/${arch}"
              mkdir -p "$target"
              find "$dir" -maxdepth 1 -type f \( -name '*.apk' -o -name '*.ipk' \) -exec cp -v {} "$target/" \;
            done
          done

          find merged -type f ! -name '*.apk' ! -name '*.ipk' -delete
          find merged -type f | sort
          find merged -type f | grep -q . || { echo "No packages to aggregate"; exit 1; }

      - name: Generate signed indexes
        env:
          KEY_BUILD: ${{ secrets.OPKG_KEY_BUILD }}
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
        run: |
          [ -z "$KEY_BUILD" ] && { echo "No OPKG signing key"; exit 1; }
          [ -z "$PRIVATE_KEY" ] && { echo "No APK signing key"; exit 1; }
          printf '%s\n' "$KEY_BUILD" > key-build
          printf '%s\n' "$PRIVATE_KEY" > private-key.pem

          for dir in merged/*/*; do
            [ -d "$dir" ] || continue
            echo "Indexing $dir"
            if ls "$dir"/*.apk >/dev/null 2>&1; then
              rm -f "$dir"/packages.adb "$dir"/packages.adb.* "$dir"/APKINDEX*
              apk.static mkndx --allow-untrusted --sign-key private-key.pem --output "$dir/packages.adb" "$dir"/*.apk
            fi
            if ls "$dir"/*.ipk >/dev/null 2>&1; then
              rm -f "$dir"/Packages "$dir"/Packages.gz "$dir"/Packages.sig
              ipkg-make-index.sh "$dir" > "$dir/Packages"
              gzip -9nc "$dir/Packages" > "$dir/Packages.gz"
              usign -S -m "$dir/Packages" -s key-build
            fi
          done

          # Derive public keys
          usign -F -p keys/dllkids-feed.pub -s key-build
          openssl ec -pubout -in private-key.pem -out keys/dllkids-feed.pub.pem

          [ -s keys/dllkids-feed.pub ] || { echo "ERROR: OPKG public key empty"; exit 1; }
          [ -s keys/dllkids-feed.pub.pem ] || { echo "ERROR: APK public key empty"; exit 1; }

      - name: Upload
        env:
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
        run: |
          # Upload keys (static, but keep them fresh)
          rclone copy keys/ "b2:${B2_BUCKET}/openwrt-feed/keys/" --checksum --fast-list

          # Upload unified feed indexes
          find merged -mindepth 2 -maxdepth 2 -type d | while IFS= read -r dir; do
            sdk=$(basename "$(dirname "$dir")")
            arch=$(basename "$dir")
            rclone purge "b2:${B2_BUCKET}/openwrt-feed/${sdk}/${arch}" || true
            rclone copy "$dir/" "b2:${B2_BUCKET}/openwrt-feed/${sdk}/${arch}/" --checksum --fast-list --transfers 8 --checkers 16
          done
