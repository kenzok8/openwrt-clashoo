name: Build or Release Issue / 构建或发布问题
description: Report package, B2 feed, APK/IPK, or GitHub Actions issues / 反馈安装包、B2 源、APK/IPK 或 GitHub Actions 问题
title: "[Build]: "
labels: ["ci", "release"]
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-check / 提交前自查
      options:
        - label: I have checked the latest release page / 我已经检查过最新 Release 页面
          required: true
        - label: I have included the failed install or build output / 我已提供失败的安装或构建输出
          required: true
  - type: dropdown
    id: sdk
    attributes:
      label: SDK Version / SDK 版本
      options:
        - "25.12"
        - "24.10"
        - Other / 其他
    validations:
      required: true
  - type: dropdown
    id: package_format
    attributes:
      label: Package Format / 包格式
      options:
        - APK
        - IPK
        - Both / 两者都有
        - unknown / 不确定
    validations:
      required: true
  - type: input
    id: arch
    attributes:
      label: Architecture / 架构
      placeholder: "e.g. x86_64, aarch64_cortex-a53"
    validations:
      required: true
  - type: input
    id: release_tag
    attributes:
      label: Release Tag / Release 标签
      placeholder: "e.g. v2026.05.16"
    validations:
      required: false
  - type: input
    id: b2_manifest
    attributes:
      label: Manifest URL / manifest 地址
      placeholder: "https://down.dllkids.xyz/openwrt-feed/clashoo/25.12/x86_64/manifest-clashoo.txt"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description / 问题描述
      description: What is wrong with the build, package, or feed? / 构建、安装包或源有什么问题？
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output / 输出
      description: Paste command output or GitHub Actions log excerpt / 粘贴命令输出或 GitHub Actions 日志片段
      render: shell
    validations:
      required: true
