env:
  SDK_VERSION: "24.10.4"
  PACKAGE: "luci-app-clash"
  FEEDNAME: "packages_ci"
  SDK_DIR: /home/user/sdk
  GITHUB_TOKEN: ENCRYPTED[!9babbfba673722cd96e111fb4e278f2995f48301e0c2f0072d2175a78bae8ad83ef46460fbfb0204cfbfadfcec2f202b!]

build_task:
  name: build / $ARCH
  only_if: $CIRRUS_BRANCH == "test" || $CIRRUS_TAG != ""

  matrix:
    - env:
        ARCH: aarch64_cortex-a53
    - env:
        ARCH: aarch64_cortex-a72
    - env:
        ARCH: aarch64_generic
    - env:
        ARCH: arm_cortex-a15_neon-vfpv4
    - env:
        ARCH: arm_cortex-a5_vfpv4
    - env:
        ARCH: arm_cortex-a7
    - env:
        ARCH: arm_cortex-a7_neon-vfpv4
    - env:
        ARCH: arm_cortex-a8_vfpv3
    - env:
        ARCH: arm_cortex-a9
    - env:
        ARCH: arm_cortex-a9_neon
    - env:
        ARCH: arm_cortex-a9_vfpv3-d16
    - env:
        ARCH: arm_fa526
    - env:
        ARCH: i386_pentium-mmx
    - env:
        ARCH: i386_pentium4
    - env:
        ARCH: mips64_octeonplus
    - env:
        ARCH: mips_24kc
    - env:
        ARCH: mips_4kec
    - env:
        ARCH: mips_mips32
    - env:
        ARCH: mipsel_24kc
    - env:
        ARCH: mipsel_24kc_24kf
    - env:
        ARCH: mipsel_74kc
    - env:
        ARCH: mipsel_mips32
    - env:
        ARCH: x86_64

  container:
    image: ghcr.io/openwrt/sdk:${SDK_VERSION}-${ARCH}
    cpu: 2
    memory: 4G

  build_script: |
    set -e
    cd "${SDK_DIR}"

    # 将本仓库以 feed 形式挂载进 SDK
    mkdir -p /tmp/myfeed
    ln -sf "${CIRRUS_WORKING_DIR}" "/tmp/myfeed/${PACKAGE}"
    { echo "src-link ${FEEDNAME} /tmp/myfeed"; cat feeds.conf.default; } > feeds.conf

    ./scripts/feeds update -a
    ./scripts/feeds install -a

    make defconfig
    make package/${PACKAGE}/compile -j$(nproc) V=s 2>&1 | tail -30

  collect_script: |
    mkdir -p "${CIRRUS_WORKING_DIR}/output"
    find "${SDK_DIR}/bin/" -name "*.ipk" -exec cp {} "${CIRRUS_WORKING_DIR}/output/" \;
    echo "==> build artifacts:"
    ls "${CIRRUS_WORKING_DIR}/output/" || echo "no .ipk files found"

  upload_release_script: |
    cd "${CIRRUS_WORKING_DIR}"
    TAG="${ARCH}-${SDK_VERSION}"
    REPO="${CIRRUS_REPO_OWNER}/${CIRRUS_REPO_NAME}"
    # create or update release
    gh release view "${TAG}" --repo "${REPO}" > /dev/null 2>&1 \
      || gh release create "${TAG}" --repo "${REPO}" --title "${TAG}" --notes "Built by Cirrus CI"
    # upload ipk files (replace existing)
    for f in output/*.ipk; do
      [ -f "$f" ] || continue
      gh release upload "${TAG}" "$f" --repo "${REPO}" --clobber
    done

  always:
    ipk_artifacts:
      path: "output/*.ipk"
